<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;font-family:'Source Sans Pro',system-ui,sans-serif;">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#4361ee"/>
      </marker>
    </defs>
    <!-- Step boxes -->
    <g transform="translate(50, 60)">
      <rect x="-40" y="-25" width="80" height="50" rx="8" fill="#9333ea"/>
      <text x="0" y="5" text-anchor="middle" fill="white" font-size="11" font-weight="600">1. Client</text>
    </g>
    <g transform="translate(170, 60)">
      <rect x="-50" y="-25" width="100" height="50" rx="8" fill="#f59e0b"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="10" font-weight="600">2. Edge POP</text>
      <text x="0" y="10" text-anchor="middle" fill="white" font-size="9">(nearest)</text>
    </g>
    <g transform="translate(310, 60)">
      <rect x="-55" y="-25" width="110" height="50" rx="8" fill="#ff6b35"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="10" font-weight="600">3. AWS Backbone</text>
      <text x="0" y="10" text-anchor="middle" fill="white" font-size="9">Private network</text>
    </g>
    <g transform="translate(450, 60)">
      <rect x="-45" y="-25" width="90" height="50" rx="8" fill="#3b82f6"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="10" font-weight="600">4. ALB</text>
      <text x="0" y="10" text-anchor="middle" fill="white" font-size="9">(regional)</text>
    </g>
    <g transform="translate(580, 60)">
      <rect x="-55" y="-25" width="110" height="50" rx="8" fill="#10b981"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="10" font-weight="600">5. EKS Pod</text>
      <text x="0" y="10" text-anchor="middle" fill="white" font-size="9">GPU inference</text>
    </g>
    <!-- Arrows -->
    <line x1="90" y1="60" x2="120" y2="60" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="220" y1="60" x2="255" y2="60" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="365" y1="60" x2="405" y2="60" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="495" y1="60" x2="525" y2="60" stroke="#4361ee" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Explanation box -->
    <g transform="translate(50, 120)">
      <rect x="0" y="0" width="600" height="140" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
      <text x="20" y="30" font-size="12" font-weight="600" fill="#1a1a2e">What happens at each step:</text>
      <text x="20" y="55" font-size="11" fill="#374151"><tspan font-weight="600" fill="#9333ea">1.</tspan> Client connects to anycast IP (same IP works globally)</text>
      <text x="20" y="75" font-size="11" fill="#374151"><tspan font-weight="600" fill="#f59e0b">2.</tspan> Request hits nearest edge POP, TCP terminates here</text>
      <text x="20" y="95" font-size="11" fill="#374151"><tspan font-weight="600" fill="#ff6b35">3.</tspan> Traffic routes over AWS backbone (not public internet)</text>
      <text x="20" y="115" font-size="11" fill="#374151"><tspan font-weight="600" fill="#3b82f6">4.</tspan> ALB distributes to healthy pods, handles SSL termination</text>
      <text x="20" y="135" font-size="11" fill="#374151"><tspan font-weight="600" fill="#10b981">5.</tspan> Pod runs inference, response follows reverse path</text>
    </g>
</svg>
