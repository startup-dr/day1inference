<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg">
<title>GRPO training step</title>
<desc>A single prompt generates 8 candidate responses, each scored by a reward function. Scores above the group mean are reinforced, below are penalized. No critic network needed.</desc>
<defs>
  <marker id="d4-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  .d4-label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
  .d4-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6b7280; }
  .d4-sm { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #6b7280; }
  .d4-r { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; }
</style>

<!-- Step 1: Single prompt -->
<rect x="260" y="20" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="d4-label" x="340" y="46" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Single prompt</text>

<line x1="340" y1="64" x2="340" y2="90" stroke="#534AB7" stroke-width="1" marker-end="url(#d4-arrow)"/>

<!-- Step 2: Generate 8 candidates -->
<text class="d4-sub" x="340" y="106" text-anchor="middle">Generate 8 candidates</text>

<rect x="72" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="102" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₁</text>
<rect x="140" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="170" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₂</text>
<rect x="208" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="238" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₃</text>
<rect x="276" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="306" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₄</text>
<rect x="344" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="374" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₅</text>
<rect x="412" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="442" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₆</text>
<rect x="480" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="510" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₇</text>
<rect x="548" y="118" width="60" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d4-r" x="578" y="138" text-anchor="middle" dominant-baseline="central" fill="#085041">R₈</text>

<line x1="340" y1="150" x2="340" y2="176" stroke="#0F6E56" stroke-width="1" marker-end="url(#d4-arrow)"/>

<!-- Step 3: Reward function -->
<rect x="230" y="180" width="220" height="44" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="d4-label" x="340" y="206" text-anchor="middle" dominant-baseline="central" fill="#633806">Reward function scores each</text>

<line x1="340" y1="224" x2="340" y2="250" stroke="#854F0B" stroke-width="1" marker-end="url(#d4-arrow)"/>

<!-- Step 4: Scores vs mean -->
<text class="d4-sub" x="340" y="266" text-anchor="middle">Scores vs. group mean</text>

<!-- Mean line -->
<line x1="72" y1="310" x2="608" y2="310" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="d4-sm" x="624" y="314">Mean</text>

<!-- Score bars -->
<rect x="84" y="290" width="36" height="20" rx="3" fill="#97C459" opacity="0.7"/>
<rect x="152" y="314" width="36" height="14" rx="3" fill="#F09595" opacity="0.7"/>
<rect x="220" y="280" width="36" height="30" rx="3" fill="#97C459" opacity="0.7"/>
<rect x="288" y="314" width="36" height="22" rx="3" fill="#F09595" opacity="0.7"/>
<rect x="356" y="286" width="36" height="24" rx="3" fill="#97C459" opacity="0.7"/>
<rect x="424" y="314" width="36" height="8" rx="3" fill="#F09595" opacity="0.7"/>
<rect x="492" y="292" width="36" height="18" rx="3" fill="#97C459" opacity="0.7"/>
<rect x="560" y="314" width="36" height="18" rx="3" fill="#F09595" opacity="0.7"/>

<line x1="340" y1="348" x2="340" y2="370" stroke="#534AB7" stroke-width="1" marker-end="url(#d4-arrow)"/>

<!-- Step 5: Policy update -->
<rect x="180" y="374" width="320" height="44" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="d4-label" x="340" y="400" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Reinforce above · Penalize below</text>

<!-- Annotation -->
<text class="d4-sm" x="340" y="436" text-anchor="middle">No critic network — the group is the baseline (unlike PPO)</text>

</svg>
