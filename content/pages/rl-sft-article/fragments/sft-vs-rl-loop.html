<div class="diagram-container" style="max-width:680px;margin:2rem auto;">
<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SFT vs RL learning loop comparison</title>
<desc>Side-by-side diagram showing SFT as a linear data-to-model pipeline versus RL as a generative loop with reward feedback.</desc>
<defs>
  <marker id="d1-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  .d1-title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 600; fill: #1a1a1a; }
  .d1-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6b7280; }
  .d1-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .d1-box-label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
  .d1-box-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; }
</style>

<!-- SFT side -->
<text class="d1-title" x="170" y="32" text-anchor="middle">Supervised fine-tuning</text>
<text class="d1-sub" x="170" y="50" text-anchor="middle">Absorptive — learns from fixed data</text>

<rect x="70" y="72" width="200" height="48" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="d1-box-label" x="170" y="100" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Curated data pairs</text>

<line x1="170" y1="120" x2="170" y2="152" stroke="#185FA5" stroke-width="1" marker-end="url(#d1-arrow)"/>

<rect x="70" y="156" width="200" height="48" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="d1-box-label" x="170" y="184" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Model trains on pairs</text>

<line x1="170" y1="204" x2="170" y2="236" stroke="#185FA5" stroke-width="1" marker-end="url(#d1-arrow)"/>

<rect x="70" y="240" width="200" height="48" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text class="d1-box-label" x="170" y="268" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Outputs mimic data</text>

<line x1="170" y1="288" x2="170" y2="320" stroke="#185FA5" stroke-width="1" marker-end="url(#d1-arrow)"/>

<rect x="70" y="324" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="d1-box-label" x="170" y="344" text-anchor="middle" dominant-baseline="central" fill="#444441">Constrained by data</text>
<text class="d1-box-sub" x="170" y="364" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Cannot discover new strategies</text>

<!-- Divider -->
<line x1="340" y1="24" x2="340" y2="400" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- RL side -->
<text class="d1-title" x="510" y="32" text-anchor="middle">Reinforcement learning</text>
<text class="d1-sub" x="510" y="50" text-anchor="middle">Generative — creates its own signal</text>

<rect x="410" y="72" width="200" height="48" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d1-box-label" x="510" y="100" text-anchor="middle" dominant-baseline="central" fill="#085041">Prompt</text>

<line x1="510" y1="120" x2="510" y2="152" stroke="#0F6E56" stroke-width="1" marker-end="url(#d1-arrow)"/>

<rect x="410" y="156" width="200" height="48" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d1-box-label" x="510" y="184" text-anchor="middle" dominant-baseline="central" fill="#085041">Generate N candidates</text>

<line x1="510" y1="204" x2="510" y2="236" stroke="#0F6E56" stroke-width="1" marker-end="url(#d1-arrow)"/>

<rect x="410" y="240" width="200" height="48" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text class="d1-box-label" x="510" y="268" text-anchor="middle" dominant-baseline="central" fill="#633806">Reward scores each</text>

<line x1="510" y1="288" x2="510" y2="320" stroke="#0F6E56" stroke-width="1" marker-end="url(#d1-arrow)"/>

<rect x="410" y="324" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="d1-box-label" x="510" y="344" text-anchor="middle" dominant-baseline="central" fill="#085041">Policy updated</text>
<text class="d1-box-sub" x="510" y="364" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Toward higher-scoring outputs</text>

<!-- RL feedback loop -->
<path d="M610 352 L636 352 L636 96 L612 96" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#d1-arrow)"/>
<text class="d1-sub" x="646" y="228" text-anchor="start">↻ loop</text>

</svg>
</div>
